name: Daily Pipeline

on:
  schedule:
    - cron: '0 14 * * *'   # 8am México (UTC-6) en horario de invierno / 9am UTC-5 verano
  workflow_dispatch:         # también manual desde la UI de GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write        # necesario para git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fontconfig
          fc-cache -f -v

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Bebas Neue font
        run: |
          echo "Font in repo: $(ls -lh assets/fonts/)"
          python3 - <<'PYEOF'
          from pathlib import Path
          from matplotlib.font_manager import FontProperties
          p = Path('assets/fonts/BebasNeue-Regular.ttf')
          assert p.exists(), f'Font missing: {p}'
          print(f'Font file size: {p.stat().st_size} bytes')
          try:
              fp = FontProperties(fname=str(p), size=12)
              print('Bebas Neue OK')
          except Exception as e:
              print(f'WARNING: {e} — usando DejaVu Sans como fallback')
          PYEOF

      - name: Run daily pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python scripts/00_daily_pipeline.py

      - name: Scrape match events corners/tarjetas (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          # --days 4: solo partidos recientes (incremental diario)
          python scripts/scrape_match_events.py --days 4 || echo "[warn] match_events falló — continuando"

      - name: Retrain betting models if needed (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python bots/retrain_bot.py || echo "[warn] retrain_bot falló — continuando"

      - name: Run daily betting analysis bot (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python bots/daily_betting_bot.py --days 3 || echo "[warn] betting_bot falló — continuando"

      - name: Generate post-match infographics (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python scripts/gen_postpartido.py --days 2 || echo "[warn] post-partido falló — continuando"

      - name: Update CCL fixtures and predictions (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          echo "── CCL: actualizando fixtures ──"
          python scripts/update_ccl_fixtures.py || echo "[warn] CCL fixtures falló — continuando"
          echo "── CCL: generando predicciones partidos pendientes ──"
          python scripts/generar_prediccion.py --competition ccl --leg2 || echo "[warn] CCL predicciones falló — continuando"

      - name: Commit and push results
        run: |
          git config user.email "bot@miau-stats.mx"
          git config user.name "MiauStats Bot"
          git add data/processed/ data/raw/historico/ data/raw/internacional/ \
                  data/raw/fotmob/ output/charts/predicciones/ output/reports/ \
                  logs/daily_summary.json 2>/dev/null || true
          # Solo commitear si hay cambios staged
          git diff --staged --quiet || \
            git commit -m "auto: daily update $(date -u +%Y-%m-%d) [skip ci]"
          git push 2>/dev/null || true

      - name: Run audit bot (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          python bots/audit_bot.py || echo "[warn] audit_bot detectó problemas — revisar reporte"

      - name: Run discovery bot — hallazgos y retroalimentación (non-critical)
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python bots/discovery_bot.py || echo "[warn] discovery_bot falló — continuando"

      - name: Send daily email summary (non-critical)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          MPLBACKEND: Agg
        run: |
          python scripts/send_daily_email.py || echo "[warn] Email falló — continuando"
