name: Daily Pipeline

on:
  schedule:
    - cron: '0 14 * * *'   # 8am México (UTC-6) en horario de invierno / 9am UTC-5 verano
  workflow_dispatch:         # también manual desde la UI de GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write        # necesario para git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fontconfig
          fc-cache -f -v

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bebas Neue font
        run: |
          mkdir -p ~/.fonts
          # Intentar descargar BebasNeue (falla silenciosamente si no hay acceso)
          curl -sL "https://fonts.gstatic.com/s/bebasneuepro/v2/CNz9x_HToo7aKxKBfqHVsPNF_Rt.woff2" \
            -o ~/.fonts/BebasNeue.ttf 2>/dev/null || true
          fc-cache -f 2>/dev/null || true

      - name: Run daily pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          MPLBACKEND: Agg
        run: |
          python scripts/00_daily_pipeline.py

      - name: Commit and push results
        run: |
          git config user.email "bot@miau-stats.mx"
          git config user.name "MiauStats Bot"
          git add data/processed/ data/raw/historico/ data/raw/internacional/ \
                  logs/daily_summary.json 2>/dev/null || true
          # Solo commitear si hay cambios staged
          git diff --staged --quiet || \
            git commit -m "auto: daily update $(date -u +%Y-%m-%d) [skip ci]"
          git push 2>/dev/null || true
